<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>注册账号 - 华胜印刷系统</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans SC',sans-serif;background:#f1f5f9;color:#0f172a}
    .wrap{max-width:460px;margin:6vh auto;padding:14px}
    .card{background:#fff;border:1px solid #dbeafe;border-radius:14px;padding:16px;box-shadow:0 8px 30px rgba(2,6,23,.06)}
    h2{margin:0 0 12px}
    .muted{font-size:13px;color:#64748b}
    .label{margin:10px 0 6px;font-size:13px;color:#334155}
    input{width:100%;box-sizing:border-box;height:42px;border:1px solid #cbd5e1;border-radius:10px;padding:0 12px;font-size:15px}
    button{height:42px;border:0;border-radius:10px;padding:0 12px;font-size:15px;font-weight:700;cursor:pointer;background:#1d4ed8;color:#fff;width:100%}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .btn-gray{background:#475569}
    #msg{margin-top:10px;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>注册新账号</h2>
      <div class="muted">提交后进入待审批，管理员通过后即可登录。</div>
      <div class="label">账号</div>
      <input id="u" placeholder="请输入账号" autocomplete="username" />
      <div class="label">密码</div>
      <input id="p" type="password" placeholder="请输入密码" autocomplete="new-password" />
      <div class="label">姓名（必填）</div>
      <input id="n" placeholder="请输入姓名" autocomplete="name" />
      <div class="row">
        <button id="submitBtn" onclick="submitReg()">提交注册</button>
        <button class="btn-gray" onclick="location.href='/'">返回登录</button>
      </div>
      <div id="msg" class="muted"></div>
    </div>
  </div>

<script>
async function submitReg(){
  const msg=document.getElementById('msg');
  const btn=document.getElementById('submitBtn');
  const username=(document.getElementById('u').value||'').trim();
  const password=(document.getElementById('p').value||'').trim();
  const fullName=(document.getElementById('n').value||'').trim();
  if(!username || !password || !fullName){ msg.style.color='#b91c1c'; msg.textContent='账号/密码/姓名都要填写'; return; }
  btn.disabled=true; btn.textContent='提交中...'; msg.style.color='#64748b'; msg.textContent='正在提交注册';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,fullName})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.error||'注册失败');
    msg.style.color='#166534';
    msg.textContent='注册成功，等待管理员审批。3秒后返回登录页...';
    setTimeout(()=>location.href='/',3000);
  }catch(e){
    msg.style.color='#b91c1c';
    msg.textContent='注册失败：'+(e.message||'未知错误');
  }finally{ btn.disabled=false; btn.textContent='提交注册'; }
}
</script>
</body>
</html>
